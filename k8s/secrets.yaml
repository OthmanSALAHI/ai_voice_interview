apiVersion: v1
kind: Secret
metadata:
  name: ai-interview-secrets
  namespace: ai-interview
type: Opaque
stringData:
  secret-key: "YOUR-SECRERT-KEY"
  database-url: "postgresql://interview_user:interview_password@postgres:5432/interview_db"
  postgres-user: "interview_user"
  postgres-password: "interview_password"
  postgres-db: "interview_db"
  allowed-origins: "http://192.168.174.146,http://192.168.174.147,http://192.168.174.148"
